name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/sourcey-godoc/go.mod
          cache: false

      - id: version
        name: Verify package version matches tag
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          node -e '
            const pkg = require("./package.json");
            const expected = process.argv[1];
            if (pkg.version !== expected) {
              console.error(`package.json version ${pkg.version} does not match tag ${expected}`);
              process.exit(1);
            }
          ' "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run godoc:go:test
      - run: npm run godoc:go:vet
      - run: npm run godoc:packages:test

      - name: Pack npm artifact
        run: |
          mkdir -p .stage/release
          npm pack --pack-destination .stage/release

      - uses: actions/upload-artifact@v4
        with:
          name: sourcey-npm-package
          path: .stage/release/sourcey-*.tgz

  github-release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sourcey-npm-package
          path: .stage/release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: .stage/release/sourcey-*.tgz

  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - uses: actions/download-artifact@v4
        with:
          name: sourcey-npm-package
          path: .stage/release

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -eu
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required to publish to npm" >&2
            exit 1
          fi
          if npm view "sourcey@${VERSION}" version >/dev/null 2>&1; then
            echo "sourcey@${VERSION} already exists on npm; skipping publish"
            exit 0
          fi
          npm publish ".stage/release/sourcey-${VERSION}.tgz" --provenance --access public

  publish-docker:
    needs: [validate, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check Docker Hub credentials
        id: gate
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Docker publish: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are not configured."
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.publish == 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.gate.outputs.publish == 'true'

      - uses: docker/login-action@v3
        if: steps.gate.outputs.publish == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.gate.outputs.publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: sourcey/sourcey
          tags: |
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.gate.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            SOURCEY_VERSION=${{ needs.validate.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
