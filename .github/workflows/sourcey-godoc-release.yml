name: sourcey-godoc release

on:
  push:
    tags:
      - "go/sourcey-godoc/v*.*.*"

concurrency:
  group: sourcey-godoc-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/sourcey-godoc/go.mod
          cache: false

      - name: Validate
        working-directory: go/sourcey-godoc
        run: |
          go test ./...
          go vet ./...

      - name: Build release assets
        working-directory: go/sourcey-godoc
        run: |
          set -eu
          version="${GITHUB_REF_NAME#go/sourcey-godoc/v}"
          mkdir -p dist
          for target in \
            darwin/amd64 \
            darwin/arm64 \
            linux/amd64 \
            linux/arm64 \
            windows/amd64 \
            windows/arm64
          do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="sourcey-godoc_${version}_${goos}_${goarch}"
            dir="dist/${name}"
            mkdir -p "$dir"
            bin="sourcey-godoc"
            if [ "$goos" = "windows" ]; then
              bin="sourcey-godoc.exe"
            fi
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${version}" \
                -o "${dir}/${bin}" ./cmd/sourcey-godoc
            cp README.md "${dir}/README.md"
            if [ "$goos" = "windows" ]; then
              (cd dist && zip -qr "${name}.zip" "${name}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            fi
            rm -rf "$dir"
          done
          (cd dist && shasum -a 256 * > checksums.txt)

      - name: Render package-manager manifests
        run: |
          packaging/sourcey-godoc/render-package-managers.sh \
            "${GITHUB_REF_NAME#go/sourcey-godoc/v}" \
            go/sourcey-godoc/dist \
            .stage/sourcey-godoc-package-managers

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            go/sourcey-godoc/dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "sourcey-godoc ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag

      - name: Publish Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "Skipping Homebrew publish: HOMEBREW_TAP_TOKEN is not configured."
            exit 0
          fi
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/sourcey/homebrew-tap.git" .stage/homebrew-tap
          mkdir -p .stage/homebrew-tap/Formula
          cp .stage/sourcey-godoc-package-managers/homebrew/Formula/sourcey-godoc.rb .stage/homebrew-tap/Formula/sourcey-godoc.rb
          git -C .stage/homebrew-tap config user.name "github-actions[bot]"
          git -C .stage/homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .stage/homebrew-tap add Formula/sourcey-godoc.rb
          if git -C .stage/homebrew-tap diff --cached --quiet; then
            exit 0
          fi
          git -C .stage/homebrew-tap commit -m "sourcey-godoc ${VERSION#go/sourcey-godoc/v}"
          git -C .stage/homebrew-tap push

      - name: Publish Scoop manifest
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          if [ -z "${SCOOP_BUCKET_TOKEN:-}" ]; then
            echo "Skipping Scoop publish: SCOOP_BUCKET_TOKEN is not configured."
            exit 0
          fi
          git clone "https://x-access-token:${SCOOP_BUCKET_TOKEN}@github.com/sourcey/scoop-bucket.git" .stage/scoop-bucket
          cp .stage/sourcey-godoc-package-managers/scoop/sourcey-godoc.json .stage/scoop-bucket/sourcey-godoc.json
          git -C .stage/scoop-bucket config user.name "github-actions[bot]"
          git -C .stage/scoop-bucket config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .stage/scoop-bucket add sourcey-godoc.json
          if git -C .stage/scoop-bucket diff --cached --quiet; then
            exit 0
          fi
          git -C .stage/scoop-bucket commit -m "sourcey-godoc ${VERSION#go/sourcey-godoc/v}"
          git -C .stage/scoop-bucket push
